prefix: "<dark_gray>[</dark_gray><gold>DynamicLights</gold><dark_gray>]</dark_gray>"

prevent-block-place: "<prefix> <gray>Le mode de verrouillage des sources lumineuses est actuellement activé. Vous devez vous accroupir pour placer des sources lumineuses depuis votre main secondaire. Ce mode peut être désactivé avec « /dl lock ». (Désactivez ce message avec « /dl lockverbose ».)</gray>"
enable-lock: "<prefix> <gray>Mode de verrouillage de la lumière activé.</gray>"
disable-lock: "<prefix> <gray>Mode de verrouillage de la lumière désactivé.</gray>"
enable-lock-verbose: "<prefix> <gray>Message d'avertissement du mode de verrouillage de la lumière activé.</gray>"
disable-lock-verbose: "<prefix> <gray>Message d'avertissement du mode de verrouillage de la lumière désactivé.</gray>"
toggle-on: "<prefix> <gray>Rendu de la lumière activé.</gray>"
toggle-off: "<prefix> <gray>Rendu de la lumière désactivé.</gray>"
reload: "<prefix> <gray>Configuration lights.yml rechargée.</gray>"
reload-error: "<prefix> <red>Échec du rechargement de la configuration lights.yml. Consultez la console.</red><gray>.</gray>"
